name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check Warnings Threshold
        run: |
          WARNING_COUNT=$(pnpm lint 2>&1 | grep -c "warning" || true)
          echo "⚠️ Current Warnings: $WARNING_COUNT"
          if [ "$WARNING_COUNT" -gt 400 ]; then
            echo "::error::Warnings ($WARNING_COUNT) exceed threshold (400). Please reduce warnings before merging."
            exit 1
          fi
          echo "✅ Warnings ($WARNING_COUNT) within acceptable range (≤400)"

      - name: TypeCheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
